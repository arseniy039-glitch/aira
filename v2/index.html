<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aira — Three Assistants. One Voice.</title>
<meta name="description" content="AI voice assistants for hotels, executives, and studios. Choose your world.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Space+Grotesk:wght@400;500&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --ink:#e8e6e1;
  --ink-dim:rgba(232,230,225,.42);
  --gold:#c9a96e;
  --teal:#4ecdc4;
  --terra:#e07a5f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ---------- LAYOUT: doors are full-height architectural slabs ---------- */
.stage{
  position:relative;
  height:100vh;
  min-height:640px;
  display:grid;
  grid-template-rows:auto 1fr;
}

/* faint floor line + reflections */
.stage::after{
  content:"";
  position:absolute;left:0;right:0;bottom:0;height:18vh;
  background:linear-gradient(to top,rgba(255,255,255,.025),transparent);
  pointer-events:none;
}

header.brand{
  position:absolute;
  top:clamp(28px,5vh,56px);
  left:50%;transform:translateX(-50%);
  text-align:center;z-index:5;
  pointer-events:none;
}
.brand .word{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,2.6vw,2.2rem);
  letter-spacing:.4em;text-indent:.4em;
  font-weight:500;
}
.brand .line{
  margin-top:10px;
  font-size:clamp(.7rem,.95vw,.85rem);
  font-weight:300;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--ink-dim);
}

/* ---------- DOORS ---------- */
.doors{
  grid-row:1/-1;
  display:flex;
  justify-content:center;
  align-items:stretch;
  gap:clamp(20px,3.5vw,72px);
  padding:0 4vw;
  height:100%;
}
.door{
  --accent:#fff;
  position:relative;
  width:min(26vw,300px);
  display:block;
  text-decoration:none;
  color:inherit;
  outline:none;
}

/* the opening in the wall: floor-to-ceiling, no arch, hairline reveal */
.portal{
  position:absolute;
  top:0;bottom:0;left:0;right:0;
  overflow:hidden;
  background:var(--world);
  /* slim architectural frame */
  border-left:1px solid rgba(255,255,255,.10);
  border-right:1px solid rgba(255,255,255,.10);
}
.portal::before{ /* interior light column */
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 30% at 50% 0%, var(--glow-top), transparent 70%),
    radial-gradient(ellipse 70% 45% at 50% 78%, var(--glow), transparent 75%);
}
.figure{
  position:absolute;
  left:50%;bottom:10vh;
  transform:translateX(-50%);
  width:44%;
  max-width:130px;
  opacity:0;
  transition:opacity .6s ease .15s, transform .8s cubic-bezier(.22,.8,.3,1) .1s;
}
.door:hover .figure,.door:focus-visible .figure{
  opacity:.9;
  transform:translateX(-50%) translateY(-8px);
}

/* the slab: full-height pivot door */
.slab{
  position:absolute;inset:0;
  transform-origin:12% center; /* pivot hinge, offset like modern pivot doors */
  transition:transform .9s cubic-bezier(.22,.8,.3,1);
  backface-visibility:hidden;
  will-change:transform;
}
.door:hover .slab,.door:focus-visible .slab{transform:rotateY(-22deg)}
.door.opening .slab{transform:rotateY(-85deg);transition-duration:1s}
.doors{perspective:2000px}
.door{perspective:1600px}

/* vertical light seam on the opening edge */
.slab::after{
  content:"";
  position:absolute;top:0;bottom:0;right:0;width:2px;
  background:var(--accent);
  opacity:0;
  filter:blur(1px);
  transition:opacity .5s;
}
.door:hover .slab::after,.door:focus-visible .slab::after{opacity:.9}

/* ---- materials ---- */
.door--concierge{--accent:var(--gold);--world:#141110;--glow:rgba(201,169,110,.5);--glow-top:rgba(201,169,110,.12)}
.door--concierge .slab{
  background:linear-gradient(170deg,#17130e,#0e0b08 55%,#141009);
  box-shadow:inset -1px 0 0 rgba(201,169,110,.5), inset 1px 0 0 rgba(201,169,110,.18), inset 0 0 60px rgba(0,0,0,.6);
}
/* fluted brass detail: fine vertical ribs */
.door--concierge .slab::before{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0 22px,rgba(201,169,110,.10) 22px 23px);
}
/* long minimal handle bar */
.door--concierge .handle{
  position:absolute;right:10%;top:34%;
  width:4px;height:32%;border-radius:2px;
  background:linear-gradient(180deg,#e8cf9a,#8f7038);
  box-shadow:0 0 14px rgba(201,169,110,.35);
}

.door--assistant{--accent:var(--teal);--world:#0c1216;--glow:rgba(78,205,196,.45);--glow-top:rgba(78,205,196,.1)}
.door--assistant .slab{
  background:linear-gradient(170deg,rgba(150,190,200,.09),rgba(80,120,140,.04) 50%,rgba(150,190,200,.11));
  backdrop-filter:blur(3px);
  box-shadow:inset 0 0 0 1px rgba(78,205,196,.35), inset 0 1px 0 rgba(255,255,255,.2), inset 0 0 44px rgba(78,205,196,.05);
}
/* smart-glass: subtle horizontal privacy bands */
.door--assistant .slab::before{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,transparent 0 48px,rgba(255,255,255,.035) 48px 50px);
}
.door--assistant .handle{
  position:absolute;right:10%;top:36%;
  width:4px;height:28%;border-radius:2px;
  background:linear-gradient(180deg,#d7efec,#5f9a95);
}

.door--admin{--accent:var(--terra);--world:#161210;--glow:rgba(224,122,95,.42);--glow-top:rgba(224,122,95,.1)}
.door--admin .slab{
  background:
    repeating-linear-gradient(90deg,rgba(0,0,0,.16) 0 2px,transparent 2px 34px),
    linear-gradient(170deg,#463225,#2c1f16 55%,#3a2a1e);
  box-shadow:inset -1px 0 0 rgba(224,122,95,.4), inset 0 0 44px rgba(0,0,0,.5);
}
.door--admin .handle{
  position:absolute;right:10%;top:36%;
  width:4px;height:28%;border-radius:2px;
  background:linear-gradient(180deg,#f0b9a4,#a34e35);
}

/* ---- labels: on the slab itself, like etched signage ---- */
.label{
  position:absolute;
  left:0;right:0;bottom:9vh;
  text-align:center;z-index:3;
  transition:transform .6s cubic-bezier(.22,.8,.3,1);
  pointer-events:none;
}
.door:hover .label,.door:focus-visible .label{transform:translateY(-6px)}
.label .name{
  font-size:clamp(.95rem,1.35vw,1.15rem);
  letter-spacing:.3em;text-indent:.3em;
  text-transform:uppercase;
  font-weight:500;
  transition:color .4s;
}
.door:hover .name,.door:focus-visible .name{color:var(--accent)}
.label .who{
  margin-top:9px;
  font-size:.76rem;font-weight:300;
  color:var(--ink-dim);
  letter-spacing:.06em;
}
.door--concierge .name{font-family:'Playfair Display',serif}
.door--assistant .name{font-family:'Space Grotesk',sans-serif}
.door--admin .name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.05rem,1.5vw,1.3rem)}

.door:focus-visible .portal{box-shadow:0 0 0 2px var(--accent)}

/* hint */
.hint{
  position:absolute;bottom:3.2vh;left:50%;transform:translateX(-50%);
  font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--ink-dim);z-index:5;
  animation:breathe 4.5s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.75}}

/* transition veil */
.veil{
  position:fixed;inset:0;background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity .5s ease .4s;z-index:50;
}
body.leaving .veil{opacity:1;pointer-events:all}

/* ---------- MOBILE: full-width tall panels stacked ---------- */
@media (max-width:760px){
  .stage{height:auto;min-height:100vh;padding:0}
  header.brand{position:relative;top:auto;left:auto;transform:none;padding:9vh 6vw 5vh}
  .doors{flex-direction:column;gap:14px;padding:0 5vw 8vh;height:auto}
  .door{width:100%;height:26vh;min-height:170px;perspective:1200px}
  .portal{border-left:none;border-right:none;border-top:1px solid rgba(255,255,255,.09);border-bottom:1px solid rgba(255,255,255,.09)}
  .slab{transform-origin:8% center}
  .door:hover .slab,.door:focus-visible .slab{transform:rotateY(-12deg)}
  .figure{bottom:12%;width:16%;max-width:70px}
  .label{bottom:auto;top:50%;transform:translateY(-50%);text-align:left;left:8%}
  .door:hover .label,.door:focus-visible .label{transform:translateY(-50%)}
  .handle{display:none}
  .hint{display:none}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}
}
</style>
</head>
<body>
<div class="veil"></div>

<main class="stage">
  <header class="brand">
    <div class="word">AIRA</div>
    <div class="line">Three assistants. One voice. Choose your world.</div>
  </header>

  <nav class="doors" aria-label="Choose your assistant">

    <a class="door door--concierge" href="/v2/concierge/" data-door>
      <div class="portal">
        <svg class="figure" viewBox="0 0 100 150" aria-hidden="true">
          <g fill="#000" opacity=".82">
            <circle cx="50" cy="30" r="11"/>
            <path d="M35 46 Q50 40 65 46 L68 100 Q50 106 32 100 Z"/>
            <rect x="30" y="100" width="14" height="46" rx="5"/>
            <rect x="56" y="100" width="14" height="46" rx="5"/>
            <path d="M64 55 L86 48" stroke="#000" stroke-width="7" stroke-linecap="round"/>
          </g>
          <ellipse cx="88" cy="45" rx="10" ry="3" fill="#c9a96e"/>
        </svg>
      </div>
      <div class="slab"><span class="handle"></span></div>
      <div class="label">
        <div class="name">Concierge</div>
        <div class="who">For hotels &amp; guesthouses</div>
      </div>
    </a>

    <a class="door door--assistant" href="/v2/assistant/" data-door>
      <div class="portal">
        <svg class="figure" viewBox="0 0 100 150" aria-hidden="true">
          <g fill="#000" opacity=".82">
            <circle cx="50" cy="34" r="11"/>
            <path d="M36 50 Q50 44 64 50 L66 92 L34 92 Z"/>
          </g>
          <rect x="18" y="92" width="64" height="5" fill="#4ecdc4" opacity=".7"/>
          <rect x="24" y="97" width="4" height="50" fill="#000" opacity=".82"/>
          <rect x="72" y="97" width="4" height="50" fill="#000" opacity=".82"/>
          <rect x="40" y="70" width="20" height="14" rx="2" fill="#0d1418" stroke="#4ecdc4" stroke-width="1.5" opacity=".9"/>
        </svg>
      </div>
      <div class="slab"><span class="handle"></span></div>
      <div class="label">
        <div class="name">Assistant</div>
        <div class="who">For executives &amp; founders</div>
      </div>
    </a>

    <a class="door door--admin" href="/v2/admin/" data-door>
      <div class="portal">
        <svg class="figure" viewBox="0 0 100 150" aria-hidden="true">
          <g fill="#000" opacity=".82">
            <circle cx="50" cy="30" r="11"/>
            <path d="M35 46 Q50 40 65 46 L67 102 Q50 108 33 102 Z"/>
            <rect x="31" y="102" width="14" height="44" rx="5"/>
            <rect x="55" y="102" width="14" height="44" rx="5"/>
          </g>
          <rect x="58" y="58" width="20" height="27" rx="3" fill="#f5f0e8" transform="rotate(8 68 71)"/>
          <rect x="61" y="62" width="14" height="3" rx="1.5" fill="#e07a5f" transform="rotate(8 68 71)"/>
          <rect x="61" y="68" width="14" height="3" rx="1.5" fill="#e07a5f" opacity=".5" transform="rotate(8 68 71)"/>
        </svg>
      </div>
      <div class="slab"><span class="handle"></span></div>
      <div class="label">
        <div class="name">Admin</div>
        <div class="who">For studios &amp; clinics</div>
      </div>
    </a>

  </nav>

  <div class="hint">Open a door</div>
</main>

<script>
document.querySelectorAll('[data-door]').forEach(function(door){
  door.addEventListener('click', function(e){
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    e.preventDefault();
    var href = door.getAttribute('href');
    door.classList.add('opening');
    document.body.classList.add('leaving');
    setTimeout(function(){ window.location.href = href; }, 950);
  });
});
</script>
</body>
</html>
